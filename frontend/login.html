<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - MLBB Info</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

<div class="particles" id="particles"></div>

<div class="auth-container">

  <!-- Logo -->
  <div class="auth-logo">
    <span class="icon">⚔️</span>
    <h1>MLBB INFO</h1>
    <p>Mobile Legends Bang Bang</p>
  </div>

  <!-- Card -->
  <div class="auth-card">
    <div class="auth-topline"></div>
    <h2>Masuk ke Akun</h2>

    <!-- Alert error (diisi PHP nanti) -->
    <div class="alert alert-error" id="loginAlert" style="display:none"></div>

    <form method="POST" action="../backend/auth/login.php" id="loginForm">

      <div class="form-group">
        <label for="username">Username / Email</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Masukkan username atau email"
          required
          autocomplete="off"
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Masukkan password"
          required
        >
      </div>

      <button type="submit" class="btn-auth">Login</button>

    </form>

    <div class="auth-divider">atau</div>
    <div class="auth-link-row">
      Belum punya akun? <a href="register.html">Daftar sekarang</a>
    </div>
  </div>

</div>

<script src="js/script.js"></script>
<script>initParticles('particles');</script>
</body>
</html>
